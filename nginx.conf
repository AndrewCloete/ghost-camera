server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.json {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
